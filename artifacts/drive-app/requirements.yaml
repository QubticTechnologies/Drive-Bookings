packages:
  "framer-motion": "For premium page transitions and micro-interactions"
  "zustand": "For seamless global session state management (driver vs client)"
  "clsx": "For dynamic class merging"
  "tailwind-merge": "For reliable tailwind class overriding"
  "lucide-react": "For beautiful consistent icons"
  "date-fns": "For readable timestamp formatting"

images:
