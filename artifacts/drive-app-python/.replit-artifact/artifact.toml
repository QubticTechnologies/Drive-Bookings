kind = "web"
  previewPath = "/streamlit/"
  title = "DriveApp Python (Streamlit)"
  version = "1.0.0"
  id = "artifacts/drive-app-python"
  router = "path"

  [[services]]
  name = "web"
  paths = ["/streamlit"]
  localPort = 5000

  [services.development]
  run = "streamlit run app.py --server.port 5000 --server.baseUrlPath /streamlit"

  [services.env]
  PORT = "5000"
  BASE_PATH = "/streamlit/"
  